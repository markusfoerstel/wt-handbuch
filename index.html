<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wild Things · Prozesse</title>
<meta property="og:title" content="Wild Things · So läuft unsere Gilde">
<meta property="og:description" content="Prozesse v0.18: Raiden, Support & Führung – wer wofür zuständig ist, mit Abläufen, Fristen und Verantwortlichen.">
<meta property="og:type" content="website">
<link rel="icon" type="image/png" href="logo.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Inter:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0E1116;
    --panel: #151B24;
    --panel-2: #1B2230;
    --border: #2A3242;
    --text: #D9DEE7;
    --muted: #8B93A3;
    --gold: #E8B34B;
    --legendary: #FF8000;  /* Kernprozess */
    --epic: #A970FF;       /* Führung */
    --rare: #2E8FEF;       /* Support */
    --bot: #3BA55D;        /* digitalisiert */
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  /* Scrollbars im Wild-Things-Look: schmal, goldener Griff, dezente Spur.
     Chromium/Safari über ::-webkit-scrollbar; Firefox über die
     Standard-Properties (nur dort gesetzt, sonst gewännen sie in Chromium
     gegen das Webkit-Styling). */
  @supports not selector(::-webkit-scrollbar) {
    * { scrollbar-width: thin; scrollbar-color: rgba(232,179,75,0.45) var(--panel); }
  }
  ::-webkit-scrollbar { width: 10px; height: 10px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb {
    background: rgba(232,179,75,0.4);
    border-radius: 999px;
    border: 2px solid transparent;
    background-clip: padding-box;
  }
  ::-webkit-scrollbar-thumb:hover {
    background: rgba(232,179,75,0.7);
    background-clip: padding-box;
  }
  ::-webkit-scrollbar-corner { background: transparent; }
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { transition: none !important; animation: none !important; }
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    background-image: radial-gradient(ellipse 80% 50% at 50% -10%, rgba(232,179,75,0.07), transparent);
    color: var(--text);
    font-family: 'Inter', system-ui, sans-serif;
    font-size: 15px;
    line-height: 1.5;
    display: flex; flex-direction: column;
  }

  /* ---------- Topbar ---------- */
  .topbar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 10px 28px; border-bottom: 1px solid var(--border);
    background: rgba(21,27,36,0.55);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand img {
    height: 46px; width: auto; display: block;
    /* weiche helle Scheibe hinter dem dunklen Lineart (statt hartem weißen Quadrat) */
    background: radial-gradient(circle, rgba(243,234,211,0.95) 52%, rgba(243,234,211,0) 74%);
    border-radius: 50%;
    padding: 2px;
  }
  .brand .name {
    font-family: 'Cinzel', serif; font-weight: 700;
    font-size: clamp(22px, 1.6vw, 30px); letter-spacing: 0.06em;
    color: #F3EAD3; text-shadow: 0 0 28px rgba(232,179,75,0.25);
  }
  .topbar-actions { display: flex; gap: 10px; }
  .topbar-actions button {
    font-family: 'IBM Plex Mono', monospace; font-size: 12.5px;
    border: 1px solid var(--border); border-radius: 999px; background: var(--panel);
    color: var(--text); padding: 7px 15px; cursor: pointer;
    transition: border-color .15s, color .15s;
  }
  .topbar-actions button:hover, .topbar-actions button:focus-visible {
    border-color: var(--gold); color: var(--gold); outline: none;
  }
  .topbar-actions b { color: var(--gold); font-weight: 500; }

  /* ---------- Landkarte: füllt den Viewport, volle Breite ---------- */
  .map {
    flex: 1; min-height: 0;
    display: flex; flex-direction: column; justify-content: center;
    gap: 2px; padding: 8px 28px 14px;
  }
  .map-hint {
    text-align: center; font-size: 12px; color: var(--muted);
    font-family: 'IBM Plex Mono', monospace; margin-bottom: 8px;
  }

  .band {
    position: relative;
    border-radius: 14px;
    padding: 14px 16px 14px 62px;
    border: 1px solid var(--border);
  }
  .band[data-tier="fuehrung"] {
    border-color: rgba(169,112,255,0.35);
    background: linear-gradient(180deg, rgba(169,112,255,0.06), rgba(169,112,255,0.015));
  }
  .band[data-tier="kern"] {
    border-color: rgba(255,128,0,0.4);
    background: linear-gradient(180deg, rgba(255,128,0,0.06), rgba(255,128,0,0.015));
  }
  .band[data-tier="support"] {
    border-color: rgba(46,143,239,0.35);
    background: linear-gradient(180deg, rgba(46,143,239,0.06), rgba(46,143,239,0.015));
  }
  .rail {
    position: absolute; left: 0; top: 0; bottom: 0; width: 46px;
    display: flex; align-items: center; justify-content: center;
  }
  .band[data-tier="fuehrung"] .rail { border-right: 1px dashed rgba(169,112,255,0.3); }
  .band[data-tier="kern"] .rail { border-right: 1px dashed rgba(255,128,0,0.35); }
  .band[data-tier="support"] .rail { border-right: 1px dashed rgba(46,143,239,0.3); }
  .rail span {
    writing-mode: vertical-rl; transform: rotate(180deg);
    font-family: 'IBM Plex Mono', monospace; font-size: 11px;
    letter-spacing: 0.22em; text-transform: uppercase; white-space: nowrap;
  }
  .band[data-tier="fuehrung"] .rail span { color: var(--epic); }
  .band[data-tier="kern"] .rail span { color: var(--legendary); }
  .band[data-tier="support"] .rail span { color: var(--rare); }

  .grid { display: grid; gap: 12px; grid-template-columns: var(--cols, 1fr); }
  @media (max-width: 1100px) { .grid { grid-template-columns: repeat(2, 1fr) !important; } }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr !important; } }

  .card {
    position: relative;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px 12px;
    cursor: pointer;
    text-align: left;
    width: 100%;
    font: inherit; color: inherit;
    transition: border-color .15s, transform .15s, box-shadow .15s;
  }
  .card:hover, .card:focus-visible { transform: translateY(-2px); }
  .card:focus-visible { outline: 2px solid var(--gold); outline-offset: 2px; }
  .band[data-tier="fuehrung"] .card:hover { border-color: var(--epic); box-shadow: 0 4px 24px rgba(169,112,255,0.15); }
  .band[data-tier="kern"] .card:hover { border-color: var(--legendary); box-shadow: 0 4px 24px rgba(255,128,0,0.15); }
  .band[data-tier="support"] .card:hover { border-color: var(--rare); box-shadow: 0 4px 24px rgba(46,143,239,0.15); }
  .card h3 {
    font-size: clamp(17px, 1.15vw, 22px); font-weight: 600;
    margin-bottom: 3px; padding-right: 26px; line-height: 1.25;
  }
  .band[data-tier="fuehrung"] .card h3 { color: var(--epic); }
  .band[data-tier="kern"] .card h3 { color: var(--legendary); }
  .band[data-tier="support"] .card h3 { color: var(--rare); }
  .card .bot-ico {
    position: absolute; top: 9px; right: 10px;
    font-size: 15px; line-height: 1; cursor: help;
  }

  /* Prozessketten: verkettete Prozesse (next) teilen sich eine Zeile */
  .chain-rows { display: grid; gap: 10px; }
  .chain { display: grid; grid-template-columns: var(--chain-cols, 1fr); gap: 6px; align-items: stretch; }
  .arrow { align-self: center; text-align: center; font-size: 22px; line-height: 1; }
  .band[data-tier="kern"] .arrow { color: rgba(255,128,0,0.75); }
  .band[data-tier="support"] .arrow { color: rgba(46,143,239,0.75); }
  .band[data-tier="fuehrung"] .arrow { color: rgba(169,112,255,0.75); }
  @media (max-width: 1100px) { .grid .arrow { display: none; } }
  @media (max-width: 640px) {
    .chain { grid-template-columns: 1fr; }
    .chain .arrow { transform: rotate(90deg); }
  }
  /* Verbindungspfeile zwischen den Ebenen */
  .link {
    display: flex; flex-direction: column; align-items: center;
    margin: 2px 0; gap: 1px;
  }
  .link .line { width: 1px; height: 10px; background: var(--muted); opacity: 0.6; }
  .link .head { color: var(--muted); font-size: 11px; line-height: 0.7; opacity: 0.9; }
  .link .lbl {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted);
    padding: 1px 0;
  }

  /* ---------- Overlays (Prozess-Modal + Offis) ---------- */
  .overlay {
    position: fixed; inset: 0; background: rgba(8,10,14,0.78);
    display: none; align-items: flex-start; justify-content: center;
    padding: 4vh 20px 20px; z-index: 50; overflow-y: auto;
    backdrop-filter: blur(3px);
  }
  .overlay.open { display: flex; }
  .tooltip {
    /* nur so breit wie der Inhalt braucht, notfalls volle Bildschirmbreite */
    width: fit-content; min-width: min(680px, 100%); max-width: 100%;
    background: linear-gradient(180deg, #131A26, #10141D);
    border: 1px solid var(--gold);
    border-radius: 8px;
    box-shadow: 0 0 0 1px rgba(0,0,0,0.6), 0 10px 50px rgba(0,0,0,0.7), 0 0 40px rgba(232,179,75,0.10);
    padding: 22px 24px 18px;
  }
  #leads-box { width: 100%; max-width: 760px; }
  .tooltip .t-title { font-family: 'Cinzel', serif; font-weight: 700; font-size: 22px; line-height: 1.25; padding-right: 36px; }
  .tooltip .t-meta { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--muted); margin: 4px 0 10px; }
  .tooltip .t-meta b { color: var(--gold); font-weight: 500; }
  .tooltip .t-meta .badge-bot { margin-left: 8px; vertical-align: 1px; }
  .badge-bot {
    display: inline-block;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; letter-spacing: 0.04em;
    border: 1px solid rgba(59,165,93,0.55); border-radius: 4px; padding: 1px 6px;
    background: rgba(59,165,93,0.12); color: var(--bot); white-space: nowrap;
  }
  .t-close {
    float: right; background: none; border: 1px solid var(--border); border-radius: 6px;
    color: var(--muted); font-size: 16px; line-height: 1; padding: 6px 9px; cursor: pointer;
  }
  .t-close:hover, .t-close:focus-visible { color: var(--text); border-color: var(--gold); outline: none; }

  /* Offi-Karten (im Overlay) */
  .leads-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; margin-top: 12px; }
  @media (max-width: 640px) { .leads-grid { grid-template-columns: 1fr; } }
  .lead-card { background: var(--panel); border: 1px solid var(--border); border-radius: 10px; padding: 15px 16px; }
  .lead-card .name { font-weight: 600; }
  .lead-card .char { font-family: 'IBM Plex Mono', monospace; font-size: 12px; color: var(--gold); }
  .lead-card ul { list-style: none; margin-top: 8px; padding: 0; }
  .lead-card li { font-size: 13px; color: var(--muted); padding-left: 14px; position: relative; margin-bottom: 3px; }
  .lead-card li::before { content: "•"; position: absolute; left: 0; color: var(--gold); }

  /* ---------- Versionslog-Panel (rechtes Drittel) ---------- */
  .logpanel {
    position: fixed; top: 0; right: 0; bottom: 0; z-index: 60;
    width: min(33vw, 560px); min-width: 300px;
    background: linear-gradient(180deg, #131A26, #10141D);
    border-left: 1px solid var(--gold);
    box-shadow: -10px 0 50px rgba(0,0,0,0.6);
    transform: translateX(105%); transition: transform .22s ease;
    display: flex; flex-direction: column;
  }
  .logpanel.open { transform: none; }
  .logpanel .lp-head {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 20px; border-bottom: 1px solid var(--border);
  }
  .logpanel .lp-head h2 {
    font-family: 'Cinzel', serif; font-weight: 600; font-size: 18px;
    color: var(--gold); letter-spacing: 0.04em;
  }
  .logpanel .entries { overflow-y: auto; padding: 14px 20px; }
  .logpanel .entry { padding: 10px 0; font-size: 13.5px; }
  .logpanel .entry + .entry { border-top: 1px solid rgba(42,50,66,0.6); }
  .logpanel .entry b { font-family: 'IBM Plex Mono', monospace; color: var(--gold); font-weight: 500; }
  .logpanel .entry span { color: var(--muted); font-family: 'IBM Plex Mono', monospace; font-size: 11px; margin-left: 8px; }
  .logpanel .entry p { margin-top: 3px; color: var(--text); }

  /* ---------- BPMN-Swimlanes ---------- */
  .sl-wrap {
    /* overflow-y: hidden, sonst erzwingt 1 px Rundungs-Überlauf eine
       nutzlose vertikale Scrollbar, die wiederum die horizontale triggert */
    overflow-x: auto; overflow-y: hidden;
    border: 1px solid var(--border); border-radius: 10px;
    background: rgba(14,17,22,0.5); margin-top: 14px;
  }
  /* Spaltenabstand 44px = Mindestbreite der Verbindungspfeile, damit die
     S-Kurven Luft haben statt sich in den Spalt zu quetschen */
  .sl-grid { position: relative; display: grid; gap: 12px 44px; padding: 14px 18px 14px 0; }
  .sl-stripe { border-top: 1px dashed rgba(42,50,66,0.9); margin: -6px -18px -6px 0; }
  .sl-stripe.first { border-top: none; }
  .sl-label {
    /* klebt per position:sticky am linken Rand (kein JS-Nachziehen = kein
       Flackern beim Scrollen). Dafür spannt das Label die ganze Zeile - in
       der schmalen Spalte 1 hätte sticky keinen Spielraum -, ein
       unsichtbarer Zwilling (.sizer) hält deren Breite. z-index über den
       Frist-/Bot-Chips (3), Hintergrund fast volldeckend, damit
       durchscrollende Knoten sauber darunter verschwinden */
    position: sticky; left: 0; justify-self: start;
    z-index: 4;
    display: flex; flex-direction: column; justify-content: center; align-items: flex-start;
    padding: 0 12px 0 14px; min-width: 108px; max-width: 150px;
    font-family: 'IBM Plex Mono', monospace; font-size: 11px; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--gold);
    background: linear-gradient(90deg, #10141D 90%, rgba(16,20,29,0));
    border-right: 1px dashed var(--border);
    margin: -6px 0; /* überbrückt die Zeilenlücken, wie die Lane-Streifen */
  }
  .sl-label.sizer { position: static; visibility: hidden; }
  .sl-label .sl-person {
    margin-top: 2px; font-size: 10px; letter-spacing: 0.02em;
    text-transform: none; color: var(--muted);
  }
  /* Zellen stapeln bei Bedarf mehrere Knoten (z. B. Ja/Nein-Zweige einer Spalte).
     Gestapelte Zellen bekommen extra Abstand als Mindesthöhe für die
     Ab-/Aufwärtsbögen der Kanten - die Lane wächst dadurch mit. */
  .sl-cell {
    z-index: 1; display: flex; flex-direction: column; justify-content: center;
    gap: 12px; min-width: 165px;
  }
  .sl-cell.stacked { gap: 48px; }
  .sl-node { position: relative; width: 100%; }
  .sl-node.n-task {
    background: var(--panel-2); border: 1px solid var(--border); border-radius: 8px;
    padding: 8px 11px; font-size: 13px;
  }
  .sl-node.n-task[data-bot] { border-color: rgba(59,165,93,0.5); }
  .sl-node.n-ev, .sl-node.n-msg { text-align: center; padding: 4px 6px; }
  /* BPMN-Ereignisse: Start = dünner Kreis, Ende = dicker Ring.
     Ein unsichtbarer Spiegel-Text über dem Kreis hält den Kreis exakt in
     der Lane-Mitte (Pfeile laufen gerade), der echte Text steht darunter. */
  .sl-node.n-ev i {
    display: block; margin: 7px auto; width: 28px; height: 28px;
    border: 2px solid var(--gold); border-radius: 50%;
    background: rgba(232,179,75,0.06);
  }
  .sl-node.n-end i { border-width: 6px; }
  .n-ev .ev-spacer { visibility: hidden; }
  .n-ev span, .n-msg span {
    font-family: 'IBM Plex Mono', monospace; font-size: 11.5px; color: var(--muted);
    display: block; line-height: 1.4;
  }
  /* BPMN-Nachrichtenereignis: Doppelkreis mit Umschlag.
     Gold = Unterstützung aus einer Lane, Grün = Bot-Erinnerung. */
  .sl-node.n-msg i {
    display: flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; margin: 3px auto 7px;
    border: 1px solid var(--gold); border-radius: 50%;
    outline: 1px solid var(--gold); outline-offset: 2.5px;
    color: var(--gold); font-size: 13px; font-style: normal;
  }
  .sl-node.n-msg[data-bot] i {
    border-color: var(--bot); outline-color: var(--bot); color: var(--bot);
  }
  /* BPMN-XOR-Gateway: markante Raute mit fettem X, Frage rechts daneben */
  .sl-node.n-gw {
    display: flex; align-items: center; gap: 15px;
    text-align: left; padding: 4px 6px;
  }
  .sl-node.n-gw .gw-diamond {
    display: flex; align-items: center; justify-content: center; flex: none;
    width: 30px; height: 30px; margin: 8px;
    border: 2px solid var(--gold); border-radius: 3px;
    background: rgba(232,179,75,0.08); transform: rotate(45deg);
  }
  .sl-node.n-gw .gw-diamond span {
    transform: rotate(-45deg); color: var(--gold);
    font-size: 17px; font-weight: 800; line-height: 1;
  }
  .sl-node.n-gw .gw-body { min-width: 0; }
  .sl-node.n-gw .gw-q { display: block; font-weight: 600; font-size: 12.5px; line-height: 1.35; }
  /* Kanten rechts + unten am Gateway: Frage wandert über die Raute
     (drawConnectors setzt .gw-top). Der unsichtbare Spiegel-Text darunter
     hält die Raute in der Lane-Mitte - wie beim Ereignis-Kreis. */
  .sl-node.n-gw .gw-spacer { display: none; }
  .sl-node.n-gw.gw-top { flex-direction: column; gap: 0; text-align: center; }
  .sl-node.n-gw.gw-top .gw-body { order: 1; }
  .sl-node.n-gw.gw-top .gw-diamond { order: 2; }
  .sl-node.n-gw.gw-top .gw-spacer { display: block; visibility: hidden; order: 3; }
  /* BPMN-Parallel-Gateway (AND): Raute mit Plus, ohne Beschriftung */
  .sl-node.n-and { justify-content: center; }
  .sl-node.n-and .gw-diamond span { font-size: 21px; font-weight: 700; }
  .n-msg .sl-tools, .n-ev .sl-tools { justify-content: center; }
  .sl-tools { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
  .sl-tool {
    font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    border: 1px solid var(--border); border-radius: 4px; padding: 1px 6px;
    background: rgba(14,17,22,0.6); color: var(--muted); white-space: nowrap;
  }
  .sl-who {
    display: block; margin-top: 4px;
    font-family: 'IBM Plex Mono', monospace; font-size: 10.5px; color: var(--gold);
  }
  .sl-frist {
    position: absolute; top: -9px; right: 8px; z-index: 3;
    font-family: 'IBM Plex Mono', monospace; font-size: 10px; white-space: nowrap;
    border: 1px solid rgba(232,179,75,0.5); border-radius: 999px; padding: 0 7px;
    background: #171E29; color: var(--gold);
  }
  .sl-frist::before { content: "⏱ "; }
  .sl-bot {
    position: absolute; top: -9px; left: 8px; z-index: 3;
    font-size: 11px; line-height: 17px;
    border: 1px solid rgba(59,165,93,0.55); border-radius: 999px; padding: 0 5px;
    background: #131C16;
  }
  .sl-svg { position: absolute; inset: 0; z-index: 0; pointer-events: none; overflow: visible; }
  .sl-svg path { fill: none; stroke: var(--muted); stroke-opacity: 0.75; stroke-width: 1.3; }
  .sl-svg path.msg { stroke-dasharray: 5 4; stroke-opacity: 0.55; }
  .sl-svg text {
    fill: var(--gold); font-family: 'IBM Plex Mono', monospace; font-size: 10px;
    letter-spacing: 0.08em; text-transform: uppercase;
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="brand">
    <img src="logo_animated.webp" alt="Wild Things Logo">
    <span class="name">Wild Things</span>
  </div>
  <div class="topbar-actions">
    <button id="btn-leads" type="button">Offis</button>
    <button id="btn-log" type="button">Versionslog · <b>v0.18</b></button>
  </div>
</header>

<main class="map">
  <p class="map-hint">Karte antippen: Ablauf als Swimlane, Zuständige &amp; Fristen · 🤖 = über den Bot digitalisiert</p>

  <section class="band" data-tier="fuehrung" aria-label="Führungsprozesse">
    <div class="rail"><span>Führung</span></div>
    <div class="grid" id="grid-fuehrung"></div>
  </section>

  <div class="link" aria-hidden="true">
    <span class="lbl">steuert</span>
    <span class="line"></span>
    <span class="head">▼</span>
  </div>

  <section class="band" data-tier="kern" aria-label="Kernprozess Raiden">
    <div class="rail"><span>Kern · Raiden</span></div>
    <div class="chain-rows" id="chain-kern"></div>
  </section>

  <div class="link" aria-hidden="true">
    <span class="head">▲</span>
    <span class="line"></span>
    <span class="lbl">unterstützt</span>
  </div>

  <section class="band" data-tier="support" aria-label="Supportprozesse">
    <div class="rail"><span>Support</span></div>
    <div class="grid" id="grid-support"></div>
  </section>
</main>

<div class="overlay" id="overlay" role="dialog" aria-modal="true" aria-labelledby="t-title">
  <div class="tooltip" id="tooltip"></div>

}

/* Rollen-Key -> "Titel (Person)"; Gruppen (Raider, Offis, ...) unverändert. */
function roleLabel(x) {

  return r ? `${r.titel} (${r.person})` : x;
}

/* ---------- Landkarte aus Daten bauen ---------- */

function botBadge(p) {
  if (!p.bot) return "";
  return `<span class="badge-bot" title="Digitalisiert durch Bot-Cog ${esc(p.bot.cog)}">🤖 Bot · ${esc(p.bot.cog)}</span>`;
}

function cardHtml(p) {
  const botIco = p.bot
    ? `<span class="bot-ico" title="Digitalisiert durch Bot-Cog ${esc(p.bot.cog)}">🤖</span>` : "";
  return `<button class="card" data-id="${esc(p.id)}">
    <h3>${esc(p.titel)}</h3>
    ${botIco}
  </button>`;
}

function buildMap() {
  const tiers = { fuehrung: [], kern: [], support: [] };
  HB.prozesse.forEach(p => tiers[p.tier].push(p));

  for (const tier of ["fuehrung", "support"]) {
    const grid = document.getElementById(`grid-${tier}`);
    const parts = [], cols = [];
    tiers[tier].forEach((p, i) => {
      parts.push(cardHtml(p));
      cols.push("1fr");
      const next = tiers[tier][i + 1];
      if (p.next && next && next.id === p.next) {
        parts.push(`<div class="arrow" aria-hidden="true">→</div>`);
        cols.push("34px");
      }
    });
    grid.style.setProperty("--cols", cols.join(" "));
    grid.innerHTML = parts.join("");
  }

  const rows = [];
  tiers.kern.forEach((p, i) => {
    const prev = tiers.kern[i - 1];
    if (prev && prev.next === p.id) rows[rows.length - 1].push(p);
    else rows.push([p]);
  });
  document.getElementById("chain-kern").innerHTML = rows.map(row =>
    `<div class="chain" style="--chain-cols:${row.map(() => "1fr").join(" 34px ")}">` +
    row.map(p => cardHtml(p)).join(`<div class="arrow" aria-hidden="true">→</div>`) +
    `</div>`
  ).join("");
}

}

/* Spalten & Kanten des Flows (BPMN-lite):
   - mehrere start-Knoten am Anfang = alternative Auslöser: teilen sich eine
     Spalte, alle münden in den ersten regulären Knoten.
   - msg-Knoten hängen als gestrichelter Nachrichtenfluss am Sequenz-Knoten
     davor - bei einer Parallel-Gruppe an allen ihren Knoten -, teilen dessen
     Spalte und sind kein eigener Prozessschritt.
   - branch-Knoten folgen einem Gateway; der erste Knoten je Label bekommt
     die beschriftete Kante vom Gateway, weitere Knoten mit demselben Label
     bilden eine Kette dahinter (Spalte je Ketten-Position). Nicht-terminale
     Ketten-Enden münden in den nächsten regulären Knoten (end ist terminal).
   - par-Knoten laufen parallel zum Sequenz-Knoten davor (impliziter
     AND-Split): gleiche Spalte, gleiche eingehende Kanten, und alle Knoten
     der Parallel-Gruppe münden in den nächsten regulären Knoten.
   - and-Knoten sind Parallel-Gateways: der Split führt Zweig-Ketten wie ein
     XOR-Gateway, nur ohne Kanten-Labels (branch gruppiert dort nur); ein
     and-Knoten ohne folgende Zweige ist der Join und sammelt als regulärer
     Knoten die Ketten-Enden ein. */
function flowLayout(flow) {
  const cols = [], edges = [];
  let col = 0, prev = -1, gw = -1, branches = [], starts = [], par = [];
  flow.forEach((n, i) => {
    if (n.e === "msg") {
      cols[i] = prev >= 0 ? cols[prev] : 0;
      const targets = par.includes(prev) ? par : prev >= 0 ? [prev] : [];
      targets.forEach(t => edges.push({ from: i, to: t, dashed: true }));
      return;
    }
    if (n.e === "start") {
      cols[i] = starts.length ? cols[starts[0]] : col++;
      starts.push(i);
      prev = i;
      return;
    }
    if (n.branch) {
      let prevSame = -1;
      for (let k = branches.length - 1; k >= 0; k--)
        if (flow[branches[k]].branch === n.branch) { prevSame = branches[k]; break; }
      if (prevSame >= 0) {
        cols[i] = cols[prevSame] + 1;
        edges.push({ from: prevSame, to: i });
      } else {
        cols[i] = branches.length ? cols[branches[0]] : col++;
        // AND-Zweige tragen kein Label - branch gruppiert dort nur die Kette.
        edges.push({ from: gw, to: i, gw: true,
                     label: flow[gw].e === "gw" ? n.branch : "" });
      }
      branches.push(i);
      prev = i;
      return;
    }
    if (n.par && par.length) {
      cols[i] = cols[par[0]];
      edges.filter(e => e.to === par[0] && !e.dashed)
        .forEach(e => edges.push({ from: e.from, to: i }));
      par.push(i);
      prev = i;
      return;
    }
    if (branches.length) col = Math.max(col, ...branches.map(b => cols[b] + 1));
    cols[i] = col++;
    if (starts.length) {
      starts.forEach(s => edges.push({ from: s, to: i }));
      starts = [];
    } else if (branches.length) {
      const tails = new Map();
      branches.forEach(b => tails.set(flow[b].branch, b));
      [...tails.values()].filter(b => flow[b].e !== "end")
        .forEach(b => edges.push({ from: b, to: i }));
      branches = [];
    } else if (par.length > 1) {
      par.forEach(p => edges.push({ from: p, to: i }));
    } else if (prev >= 0) {
      edges.push({ from: prev, to: i });
    }
    par = [i];
    if (n.e === "gw" || n.e === "and") gw = i;
    prev = i;
  });
  return { cols, edges };
}

function slNodeHtml(n, idx) {
  const frist = n.frist ? `<span class="sl-frist">${esc(n.frist)}</span>` : "";
  const bot = n.bot ? `<span class="sl-bot" title="Automatisch durch den Bot">🤖</span>` : "";
  const attrs = `data-node="${idx}"${n.bot ? ' data-bot="1"' : ""}`;
  if (n.e === "start" || n.e === "end") {
    return `<div class="sl-node n-ev${n.e === "end" ? " n-end" : ""}" ${attrs}>${frist}${bot}<span class="ev-spacer" aria-hidden="true">${esc(n.text)}</span><i></i><span>${esc(n.text)}</span></div>`;
  }
  if (n.e === "gw") {
    const body = `<span class="gw-q">${esc(n.text)}</span>${slToolsHtml(n)}`;
    return `<div class="sl-node n-gw" ${attrs}>${frist}<span class="gw-diamond"><span>✕</span></span><span class="gw-body">${body}</span><span class="gw-body gw-spacer" aria-hidden="true">${body}</span></div>`;
  }
  if (n.e === "and") {
    return `<div class="sl-node n-gw n-and" ${attrs}>${frist}<span class="gw-diamond"><span>+</span></span></div>`;
  }
  if (n.e === "msg") {
    return `<div class="sl-node n-msg" ${attrs}>${frist}<i>✉</i><span>${esc(n.text)}</span></div>`;
  }
  const who = n.who ? `<span class="sl-who">${esc(n.who)}</span>` : "";
  return `<div class="sl-node n-task" ${attrs}>${frist}${bot}${esc(n.text)}${slToolsHtml(n)}${who}</div>`;
}

function swimlaneHtml(p) {
  const { cols } = flowLayout(p.flow);
  const rows = p.lanes.length, ncols = Math.max(...cols) + 1;
  let html = `<div class="sl-wrap"><div class="sl-grid" style="grid-template-rows:repeat(${rows},minmax(64px,auto));grid-template-columns:max-content repeat(${ncols},minmax(165px,1fr))">`;
  p.lanes.forEach((lane, i) => {
    html += `<div class="sl-stripe ${i === 0 ? "first" : ""}" style="grid-row:${i + 1};grid-column:1/-1"></div>`;
    const r = HB.rollen[lane];
    const label = r
      ? `${esc(r.titel)}<span class="sl-person">${esc(r.person)}</span>` : esc(lane);
    html += `<div class="sl-label sizer" aria-hidden="true" style="grid-row:${i + 1};grid-column:1">${label}</div>`;
    html += `<div class="sl-label" style="grid-row:${i + 1};grid-column:1/-1">${label}</div>`;
  });
  const cells = new Map();
  p.flow.forEach((n, j) => {
    const key = `${p.lanes.indexOf(n.lane) + 1}:${cols[j] + 2}`;
    if (!cells.has(key)) cells.set(key, []);
    cells.get(key).push(j);
  });
  for (const [key, nodes] of cells) {
    const [row, colnr] = key.split(":");
    html += `<div class="sl-cell${nodes.length > 1 ? " stacked" : ""}" style="grid-row:${row};grid-column:${colnr}">` +
      nodes.map(j => slNodeHtml(p.flow[j], j)).join("") + `</div>`;
  }
  html += `<svg class="sl-svg" aria-hidden="true"></svg></div></div>`;
  return html;
}

function drawConnectors() {
  const grid = tooltip.querySelector(".sl-grid");
  if (!grid || !currentProc) return;
  const svg = grid.querySelector(".sl-svg");
  const { edges } = flowLayout(currentProc.flow);
  // Pfeile docken am Symbol an (Ereignis-Kreis, Gateway-Raute, Umschlag),
  // nicht an der unsichtbaren zellbreiten Knoten-Box; Tasks bleiben die Box.
  // Die Raute ist rotiert - ihre Bounding-Box berührt genau die Spitzen.
  const nodeOf = i => grid.querySelector(`.sl-node[data-node="${i}"]`);
  const rectOf = i => {
    const el = nodeOf(i);
    const sym = el.querySelector("i, .gw-diamond");
    return (sym || el).getBoundingClientRect();
  };
  // XOR-Gateway: Verlassen Kanten die Raute rechts UND unten, wandert die
  // Frage über die Raute - rechts stünde sie der austretenden Kante im Weg.
  // Aus der Kantengeometrie erkannt (gleiche Schwellen wie die Zweig-Kanten
  // unten); der Spiegel-Spacer hält die Raute in der Lane-Mitte, das
  // Umschalten ändert die Austrittsseiten also nicht.
  currentProc.flow.forEach((n, i) => {
    if (n.e !== "gw") return;
    const y1 = rectOf(i).top + rectOf(i).height / 2;
    const sides = edges.filter(e => e.from === i && !e.dashed).map(e => {
      if (!e.gw) return "right";
      const b = rectOf(e.to), y2 = b.top + b.height / 2;
      return y2 < y1 - 4 ? "top" : y2 > y1 + 4 ? "bottom" : "right";
    });
    nodeOf(i).classList.toggle("gw-top",
      sides.includes("right") && sides.includes("bottom") && !sides.includes("top"));
  });
  // Erst nach dem Umschalten messen - .gw-top kann Zeilenhöhen ändern.
  const g = grid.getBoundingClientRect();
  // Mehrere Nachrichtenflüsse desselben msg-Knotens (Parallel-Gruppe) fächern
  // seitlich auf, sonst lägen die senkrechten Linien deckungsgleich übereinander.
  const fans = new Map();
  edges.filter(e => e.dashed).forEach(e => {
    if (!fans.has(e.from)) fans.set(e.from, []);
    fans.get(e.from).push(e);
  });
  const defs = `<defs>` +
    `<marker id="sl-arrow" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="7" markerHeight="7" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#8B93A3" fill-opacity="0.9" stroke="none"/></marker>` +
    `</defs>`;
  let out = "";
  for (const e of edges) {
    const a = rectOf(e.from), b = rectOf(e.to);
    if (e.dashed) {
      // Nachrichtenfluss (BPMN): gestrichelt, senkrecht.
      // Startet an der Box-Kante des msg-Knotens (unter/über dessen Text),
      // zielt aber auf das Symbol bzw. die Box des Zielknotens.
      const aBox = nodeOf(e.from).getBoundingClientRect();
      const up = b.bottom <= aBox.top;
      const sibs = fans.get(e.from);
      const off = (sibs.indexOf(e) - (sibs.length - 1) / 2) * 12;
      const x1 = a.left + a.width / 2 - g.left + off, x2 = b.left + b.width / 2 - g.left + off;
      const y1 = (up ? aBox.top : aBox.bottom) - g.top, y2 = (up ? b.bottom : b.top) - g.top;
      const ym = (y1 + y2) / 2;
      const d = Math.abs(x1 - x2) < 2
        ? `M${x1},${y1} L${x2},${y2}`
        : `M${x1},${y1} L${x1},${ym} L${x2},${ym} L${x2},${y2}`;
      out += `<path class="msg" d="${d}" marker-end="url(#sl-arrow)"/>`;
      continue;
    }
    // Sequenzfluss: rechts Mitte -> links Mitte, Knicke als Bézier gerundet.
    // Zweig-Kanten (vom Gateway) verlassen die Raute oben/unten, wenn ihr
    // Ziel klar über/unter der Raute liegt - wie im BPMN-Lehrbuch.
    const x2 = b.left - g.left, y2 = b.top + b.height / 2 - g.top;
    let x1 = a.right - g.left, y1 = a.top + a.height / 2 - g.top;
    let exit = "right";
    if (e.gw) {
      if (y2 < y1 - 4) exit = "top";
      else if (y2 > y1 + 4) exit = "bottom";
      if (exit !== "right") {
        x1 = a.left + a.width / 2 - g.left;
        y1 = (exit === "top" ? a.top : a.bottom) - g.top;
      }
    }
    let d;
    if (exit !== "right") {
      const dy = Math.sign(y2 - y1);
      const r = Math.min(14, Math.abs(y2 - y1) / 2, Math.max(2, x2 - x1));
      d = `M${x1},${y1} L${x1},${y2 - r * dy} Q${x1},${y2} ${x1 + r},${y2} L${x2},${y2}`;
    } else if (Math.abs(y1 - y2) < 2) {
      d = `M${x1},${y1} L${x2},${y2}`;
    } else {
      const xm = (x1 + x2) / 2;
      const r = Math.min(14, xm - x1, x2 - xm, Math.abs(y2 - y1) / 2);
      const dy = Math.sign(y2 - y1);
      d = `M${x1},${y1} L${xm - r},${y1} Q${xm},${y1} ${xm},${y1 + r * dy} ` +
          `L${xm},${y2 - r * dy} Q${xm},${y2} ${xm + r},${y2} L${x2},${y2}`;
    }
    out += `<path d="${d}" marker-end="url(#sl-arrow)"/>`;
    if (e.label) {
      // Label am Anfang der Kante, direkt an der Austrittsstelle
      const ly = exit === "bottom" ? y1 + 14 : y1 - 7;
      out += `<text x="${x1 + 6}" y="${ly}">${esc(e.label)}</text>`;
    }
  }
  svg.innerHTML = defs + out;
}

/* ---------- Prozess-Modal ---------- */

const overlay = document.getElementById("overlay");
const tooltip = document.getElementById("tooltip");
let lastFocus = null;
let currentProc = null; // offener Prozess, drawConnectors braucht dessen Flow

function open(id) {
  const p = byId[id];
  if (!p) return;
  currentProc = p;
  let html = `<button class="t-close" aria-label="Schließen">✕</button>`;
  html += `<div class="t-title" id="t-title" style="color:${TIER_COLOR[p.tier]}">${esc(p.titel)}</div>`;
  // Zuständige stehen nicht im Kopf - die Swimlanes zeigen, wer was tut.
  const meta = [];
  if (p.vertretung) meta.push(`Vertretung: <b>${esc(roleLabel(p.vertretung))}</b>`);
  if (p.bot) meta.push(botBadge(p));
  html += `<div class="t-meta">${esc(p.zweck)}${meta.length ? "<br>" + meta.join(" · ") : ""}</div>`;
  html += swimlaneHtml(p);
  tooltip.innerHTML = html;
  overlay.classList.add("open");
  document.body.style.overflow = "hidden";
  tooltip.querySelector(".t-close").focus();
  tooltip.querySelector(".t-close").addEventListener("click", closeProcess);
  requestAnimationFrame(drawConnectors);
}

function closeProcess() {
  overlay.classList.remove("open");
  document.body.style.overflow = "";
  if (lastFocus) lastFocus.focus();
}

/* ---------- Offi-Overlay + Versionslog-Panel ---------- */

const leadsOverlay = document.getElementById("leads-overlay");
const logpanel = document.getElementById("logpanel");

function buildLog() {
  document.getElementById("log-entries").innerHTML = HB.changelog.map(c =>
    `<div class="entry"><b>v${esc(c.version)}</b><span>${esc(c.datum)}</span><p>${esc(c.text)}</p></div>`
  ).join("");
}

function buildLeads() {
  document.getElementById("leads-grid").innerHTML = HB.offis.map(m => {
    const rollen = Object.values(HB.rollen).filter(r => r.person.includes(m.name));
    return `<div class="lead-card"><span class="name">${esc(m.name)}</span> <span class="char">${esc(m.char)}</span>
      <ul>${rollen.map(r => `<li>${esc(r.titel)}</li>`).join("")}</ul></div>`;
  }).join("");
}

/* ---------- Init ---------- */

buildMap();
buildLog();
buildLeads();
document.querySelectorAll(".card").forEach(c => {
  c.addEventListener("click", () => { lastFocus = c; open(c.dataset.id); });
});
overlay.addEventListener("click", e => { if (e.target === overlay) closeProcess(); });
leadsOverlay.addEventListener("click", e => { if (e.target === leadsOverlay) leadsOverlay.classList.remove("open"); });
leadsOverlay.querySelector(".t-close").addEventListener("click", () => leadsOverlay.classList.remove("open"));
document.getElementById("btn-leads").addEventListener("click", () => leadsOverlay.classList.add("open"));
document.getElementById("btn-log").addEventListener("click", () => logpanel.classList.toggle("open"));
document.getElementById("lp-close").addEventListener("click", () => logpanel.classList.remove("open"));
document.addEventListener("keydown", e => {
  if (e.key !== "Escape") return;
  if (overlay.classList.contains("open")) closeProcess();
  else if (leadsOverlay.classList.contains("open")) leadsOverlay.classList.remove("open");
  else if (logpanel.classList.contains("open")) logpanel.classList.remove("open");
});
window.addEventListener("resize", () => { if (overlay.classList.contains("open")) drawConnectors(); });
</script>
